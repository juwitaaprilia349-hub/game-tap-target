<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Tap Target</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    .info div {
      flex: 1;
      min-width: 90px;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 12px;
      font-weight: bold;
    }

    button {
      background: #22c55e;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0 16px;
    }

    button:disabled {
      background: gray;
    }

    #gameArea {
      position: relative;
      width: 100%;
      height: 360px;
      background: #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid white;
    }

    #target {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #ef4444;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      user-select: none;
      touch-action: manipulation;
      box-shadow: 0 6px 12px rgba(0,0,0,0.25);
    }

    #message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      font-weight: bold;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎯 Game Tap Target</h1>
    <p>Ketuk target merah sebanyak mungkin sebelum waktu habis.</p>

    <div class="info">
      <div>Skor: <span id="score">0</span></div>
      <div>Waktu: <span id="time">30</span></div>
      <div>High Score: <span id="highScore">0</span></div>
    </div>

    <button id="startBtn">Mulai Game</button>

    <div id="gameArea">
      <div id="message">Tekan tombol "Mulai Game"</div>
      <div id="target">🎯</div>
    </div>
  </div>

  <script>
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const highScoreEl = document.getElementById("highScore");
    const startBtn = document.getElementById("startBtn");
    const gameArea = document.getElementById("gameArea");
    const target = document.getElementById("target");
    const message = document.getElementById("message");

    let score = 0;
    let timeLeft = 30;
    let timer = null;
    let playing = false;

    let highScore = localStorage.getItem("tapTargetHighScore") || 0;
    highScoreEl.textContent = highScore;

    function updateUI() {
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      highScoreEl.textContent = highScore;
    }

    function moveTarget() {
      const maxX = gameArea.clientWidth - target.offsetWidth;
      const maxY = gameArea.clientHeight - target.offsetHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      playing = true;
      message.textContent = "";
      target.style.display = "flex";
      startBtn.disabled = true;

      moveTarget();
      updateUI();

      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        updateUI();

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      playing = false;
      clearInterval(timer);
      target.style.display = "none";
      startBtn.disabled = false;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("tapTargetHighScore", highScore);
        message.innerHTML = `Waktu habis!<br>Skor kamu: ${score}<br>🏆 Rekor baru!`;
      } else {
        message.innerHTML = `Waktu habis!<br>Skor kamu: ${score}`;
      }

      updateUI();
    }

    target.addEventListener("pointerdown", () => {
      if (!playing) return;
      score++;
      moveTarget();
      updateUI();
    });

    startBtn.addEventListener("click", startGame);
    updateUI();
  </script>
</body>
</html>
